version: "3.8"

services:
  postgres:
    image: postgres:15
    container_name: support-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
      POSTGRES_DB: support_chat
    ports:
      - "5432:5432"
    volumes:
      - support_data:/var/lib/postgresql/data

  backend:
    build: .
    container_name: support-backend
    restart: always
    ports:
      - "5000:5000"
    depends_on:
      - postgres
    environment:
      PORT: 5000
      DB_USER: postgres
      DB_HOST: postgres
      DB_NAME: support_chat
      DB_PASSWORD: postgres123
      DB_PORT: 5432

volumes:
  support_data: